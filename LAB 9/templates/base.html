<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            margin: 0;
            padding: 20px;
            color: #eee;
        }
        .header {
            background-color: #16213e;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .add-form {
            background-color: #0f3460;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        input[type="text"], input[type="number"] {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            width: 200px;
        }
        button {
            background-color: #e94560;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff6b6b;
        }
        .games-list {
            background-color: #16213e;
            border-radius: 10px;
            padding: 20px;
        }
        .game-item {
            background-color: #0f3460;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-info {
            font-size: 18px;
        }
        .game-year {
            font-weight: bold;
            color: #e94560;
            font-size: 20px;
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 5px 15px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Completed Games</h1>
            <p>Track all the games you've finished</p>
        </div>
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
